<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>识别演示 - 蝴蝶教育 Web Demo</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/config.js"></script>
</head>
<body>
<header>
  <h1>识别演示</h1>
  <nav>
    <a href="/index.html">首页</a>
    <a href="/browse.html">百科检索</a>
    <a href="/recognition.html">识别演示</a>
  </nav>
</header>
<main>
  <section class="card">
    <h2>识别任务查询</h2>
    <label>job_id</label>
    <input id="jobId" value="rec_001" />
    <button id="load">查询</button>
    <p class="small" id="status">未加载</p>
    <pre id="output">点击“查询”查看识别结果…</pre>
  </section>
</main>
<script type="module">
  import { getRecognition, getDemoMode } from './api.js';

  const output = document.getElementById('output');
  const statusEl = document.getElementById('status');

  function formatResult(result) {
    return {
      source: result.__demo || { source: 'api' },
      job_id: result.job_id,
      candidates: result.candidates,
      explanation: {
        why_matched: result.explanation.why_matched,
        quality_flags: result.explanation.quality_flags,
        recommended_next_steps: result.explanation.recommended_next_steps,
      },
    };
  }

  async function runRecognition() {
    statusEl.textContent = '查询中...';
    output.textContent = '';
    const jobId = document.getElementById('jobId').value;
    const result = await getRecognition(jobId);
    statusEl.textContent = `模式=${getDemoMode()} | 数据源=${result.__demo?.source || 'api'}`;
    output.textContent = JSON.stringify(formatResult(result), null, 2);
  }

  document.getElementById('load').addEventListener('click', () => {
    runRecognition().catch((e) => {
      statusEl.textContent = '查询失败';
      output.textContent = String(e.message || e);
    });
  });
</script>
</body>
</html>
