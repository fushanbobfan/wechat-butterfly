<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>百科检索 - 蝴蝶教育 Web Demo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header>
  <h1>百科检索</h1>
  <nav>
    <a href="/index.html">首页</a>
    <a href="/browse.html">百科检索</a>
    <a href="/recognition.html">识别演示</a>
  </nav>
</header>
<main>
  <section class="card">
    <h2>题库浏览（复用统一协议）</h2>
    <button id="load">加载题库</button>
    <pre id="output">点击“加载题库”查看数据…</pre>
  </section>
</main>
<script type="module">
  import { getGameConfig, postAnalytics } from './api.js';

  const output = document.getElementById('output');
  document.getElementById('load').addEventListener('click', async () => {
    try {
      const config = await getGameConfig();
      await postAnalytics();
      output.textContent = JSON.stringify(config, null, 2);
    } catch (e) {
      output.textContent = String(e.message || e);
    }
  });
</script>
</body>
</html>
