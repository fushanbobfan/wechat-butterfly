<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>蝴蝶百科检索</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/config.js"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand"><span class="brand-dot"></span>蝴蝶百科检索</div>
    <nav>
      <a href="/index.html">首页</a>
      <a href="/browse.html">百科检索</a>
      <a href="/recognition.html">识别演示</a>
    </nav>
  </div>
</header>

<main>
  <section class="card">
    <h2>筛选器</h2>
    <div class="grid grid-2">
      <div>
        <label>关键词</label>
        <input id="query" placeholder="例如 绿、Papilio、尾突" />
      </div>
      <div>
        <label>温度偏好</label>
        <select id="temperature">
          <option value="">全部</option>
          <option value="cold">cold</option>
          <option value="temperate">temperate</option>
          <option value="warm">warm</option>
          <option value="hot">hot</option>
        </select>
      </div>
    </div>
    <div class="row">
      <button id="search">立即搜索</button>
      <span class="badge gray" id="status">未加载</span>
    </div>
  </section>

  <section class="card">
    <h2>物种结果</h2>
    <div id="list"></div>
  </section>

  <section class="card">
    <h2>学习卡片（Flash Card）</h2>
    <div class="row">
      <button id="next-card">下一张</button>
      <span class="badge primary" id="card-index">0 / 0</span>
    </div>
    <div id="flash-card" class="result-box" style="margin-top:10px;"></div>
  </section>
</main>

<footer>Butterfly Education · Browse & Learn</footer>

<script type="module">
  import { getTaxa, getDemoMode, getGameConfig, postAnalytics } from './api.js';

  const listEl = document.getElementById('list');
  const statusEl = document.getElementById('status');
  const queryEl = document.getElementById('query');
  const tempEl = document.getElementById('temperature');
  const flashEl = document.getElementById('flash-card');
  const cardIndexEl = document.getElementById('card-index');
  let flashQuestions = [];
  let flashIndex = 0;

  function renderTaxa(rows) {
    if (!rows.length) {
      listEl.innerHTML = '<p class="muted">没有命中结果，请调整筛选条件。</p>';
      return;
    }

    listEl.innerHTML = rows.map((row) => `
      <article class="taxon-card">
        <h3 class="taxon-title">
          <span>${row.display_name_zh} <span class="small">${row.scientific_name}</span></span>
          <span class="badge primary">${row.primary_color}</span>
        </h3>
        <p>${row.kid_summary}</p>
        <p class="small">温度偏好：${row.temperature_preference.join(', ')} ｜ 栖息地：${(row.habitat || []).join(', ')}</p>
      </article>
    `).join('');
  }

  function renderFlashCard() {
    if (!flashQuestions.length) {
      flashEl.innerHTML = '<p class="muted">暂无学习卡片</p>';
      cardIndexEl.textContent = '0 / 0';
      return;
    }

    const index = flashIndex % flashQuestions.length;
    const q = flashQuestions[index];
    cardIndexEl.textContent = `${index + 1} / ${flashQuestions.length}`;
    flashEl.innerHTML = `
      <h3>${q.topic}</h3>
      <p>${q.stem}</p>
      <p class="small">特征标签：${q.trait_tag}</p>
      <p class="tip">学习提示：${q.explanation.details}</p>
    `;
  }

  async function loadFlashCards() {
    const config = await getGameConfig();
    flashQuestions = config.questions || [];
    renderFlashCard();
  }

  async function search() {
    statusEl.textContent = '加载中...';
    const keyword = queryEl.value || '';
    const temperature = tempEl.value || '';
    const result = await getTaxa(keyword, temperature);
    await postAnalytics();

    statusEl.textContent = `模式=${getDemoMode()} | 数据源=${result.source} | 命中=${result.rows.length}`;
    statusEl.className = `badge ${result.source === 'api' ? 'success' : 'warning'}`;
    renderTaxa(result.rows);
  }

  document.getElementById('search').addEventListener('click', () => {
    search().catch((e) => {
      statusEl.textContent = '加载失败';
      statusEl.className = 'badge warning';
      listEl.innerHTML = `<p>${String(e.message || e)}</p>`;
    });
  });

  document.getElementById('next-card').addEventListener('click', () => {
    flashIndex += 1;
    renderFlashCard();
  });

  Promise.all([loadFlashCards(), search()]).catch(() => {
    flashEl.innerHTML = '<p>学习卡片加载失败</p>';
  });
</script>
</body>
</html>
