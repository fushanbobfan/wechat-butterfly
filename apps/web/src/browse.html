<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>百科检索 - 蝴蝶教育 Web Demo</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/config.js"></script>
</head>
<body>
<header>
  <h1>百科检索</h1>
  <nav>
    <a href="/index.html">首页</a>
    <a href="/browse.html">百科检索</a>
    <a href="/recognition.html">识别演示</a>
  </nav>
</header>
<main>
  <section class="card">
    <h2>题库浏览 / 搜索（统一契约）</h2>
    <label>关键词（物种ID/题干/特征标签）</label>
    <input id="query" placeholder="例如 papilio 或 antenna" />
    <button id="load">加载并搜索</button>
    <p class="small" id="status">未加载</p>
    <pre id="output">输入关键词后点击“加载并搜索”...</pre>
  </section>
</main>
<script type="module">
  import { getGameConfig, postAnalytics, getDemoMode } from './api.js';

  const output = document.getElementById('output');
  const queryInput = document.getElementById('query');
  const statusEl = document.getElementById('status');

  async function runSearch() {
    statusEl.textContent = '加载中...';
    output.textContent = '';

    const config = await getGameConfig();
    const keyword = (queryInput.value || '').trim().toLowerCase();
    const matches = config.questions.filter((q) => {
      const haystack = [q.stem, q.taxon_id, q.trait_tag, q.topic].join(' ').toLowerCase();
      return keyword ? haystack.includes(keyword) : true;
    });

    const analyticsResult = await postAnalytics();

    statusEl.textContent = `模式=${getDemoMode()} | 数据源=${config.__demo?.source || 'unknown'} | 命中=${matches.length}`;

    output.textContent = JSON.stringify(
      {
        data_source: config.__demo || {},
        analytics: analyticsResult,
        total_questions: config.questions.length,
        matched_questions: matches.length,
        matches,
      },
      null,
      2,
    );
  }

  document.getElementById('load').addEventListener('click', () => {
    runSearch().catch((e) => {
      statusEl.textContent = '加载失败';
      output.textContent = String(e.message || e);
    });
  });
</script>
</body>
</html>
